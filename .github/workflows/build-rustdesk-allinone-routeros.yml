name: rustdesk-allinone-routeros

on:
  workflow_dispatch:
    inputs:
      api_version:
        description: 'RustDesk API 版本号 (例如 v2.7 或 master)'
        required: true
        default: 'v2.7'
      web_version:
        description: 'Web 前端分支/版本'
        required: true
        default: 'master'

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: rustdesk-allinone

jobs:
  build-push-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Dockerfile
        run: |
          cat > Dockerfile <<'EOF'
          # ---- 阶段1: 编译 API 与 Web ----
          FROM golang:1.23-alpine AS api_builder
          
          ARG RUSTDESK_API_REF=master
          ARG RUSTDESK_API_WEB_REF=master
          
          RUN apk add --no-cache git bash nodejs npm build-base sqlite-dev
          
          WORKDIR /src
          RUN git clone --depth 1 --branch "${RUSTDESK_API_REF}" https://github.com/lejianwen/rustdesk-api.git .
          
          # 构建 Web 前端
          RUN set -x; \
              cd resources; \
              mkdir -p admin; \
              git clone --depth 1 --branch "${RUSTDESK_API_WEB_REF}" https://github.com/lejianwen/rustdesk-api-web.git; \
              cd rustdesk-api-web; \
              npm ci; \
              npm run build; \
              cp -a dist/* ../admin/
          
          # 编译 API 主程序 (防弹版)
          ENV CGO_ENABLED=1 GOOS=linux
          RUN set -x; \
              mkdir -p /out/data /out/runtime; \
              # 自动整理依赖，防止老版本 go.mod 报错
              go mod tidy || true; \
              go mod download || exit 1; \
              # 编译并输出详细日志 (-v)，如果失败直接暴露死因
              go build -v -ldflags "-s -w" -o /out/apimain . || exit 1; \
              # 安全拷贝：如果有这个文件夹才拷，没有就跳过，绝对不报错！
              [ -d conf ] && cp -a conf /out/conf || true; \
              [ -d resources ] && cp -a resources /out/resources || true; \
              [ -d docs ] && cp -a docs /out/docs || true

          # ---- 阶段2: 提取官方 S6 ----
          FROM rustdesk/rustdesk-server-s6:latest AS server

          # ---- 阶段3: 最终组装 (纯净 Alpine) ----
          FROM alpine:latest
          
          RUN apk add --no-cache tzdata ca-certificates

          COPY --from=server /init /init
          COPY --from=server /etc/s6-overlay /etc/s6-overlay
          COPY --from=server /package /package
          COPY --from=server /usr/bin/healthcheck.sh /usr/bin/healthcheck.sh
          COPY --from=server /usr/bin/hbbr /usr/bin/hbbr
          COPY --from=server /usr/bin/hbbs /usr/bin/hbbs
          COPY --from=server /usr/bin/rustdesk-utils /usr/bin/rustdesk-utils
          COPY --from=server /command /command

          WORKDIR /app
          COPY --from=api_builder /out/ /app/

          RUN set -x; \
              mkdir -p /etc/s6-overlay/s6-rc.d/api; \
              printf "key-secret\nhbbs\n" > /etc/s6-overlay/s6-rc.d/api/dependencies; \
              echo "longrun" > /etc/s6-overlay/s6-rc.d/api/type; \
              printf "%s\n" "#!/command/with-contenv sh" "cd /app" "exec ./apimain" > /etc/s6-overlay/s6-rc.d/api/run; \
              chmod +x /etc/s6-overlay/s6-rc.d/api/run; \
              touch /etc/s6-overlay/s6-rc.d/user/contents.d/api; \
              echo "/package/admin/s6/command/s6-svstat /run/s6-rc/servicedirs/api || exit 1" >> /usr/bin/healthcheck.sh; \
              ln -sf /run /var/run

          VOLUME /data
          VOLUME /app/data

          EXPOSE 21114 21115 21116 21116/udp 21117 21118 21119

          ENV RELAY=relay.example.com \
              ENCRYPTED_ONLY=0 \
              TZ=Asia/Shanghai

          ENTRYPOINT ["/init"]
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          # 先只编 amd64，跑通了你要 arm64 我们再加上
          platforms: linux/amd64
          build-args: |
            RUSTDESK_API_REF=${{ github.event.inputs.api_version }}
            RUSTDESK_API_WEB_REF=${{ github.event.inputs.web_version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.api_version }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Build amd64 image (local) and docker save
        run: |
          docker buildx build --platform linux/amd64 --load \
            -f Dockerfile \
            --build-arg RUSTDESK_API_REF=${{ github.event.inputs.api_version }} \
            --build-arg RUSTDESK_API_WEB_REF=${{ github.event.inputs.web_version }} \
            -t ${IMAGE_NAME}:${{ github.event.inputs.api_version }}-amd64 .
          docker save ${IMAGE_NAME}:${{ github.event.inputs.api_version }}-amd64 -o ${IMAGE_NAME}-${{ github.event.inputs.api_version }}-amd64.tar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.api_version }}
          name: RustDesk All-in-One ${{ github.event.inputs.api_version }}
          files: |
            ${{ env.IMAGE_NAME }}-${{ github.event.inputs.api_version }}-amd64.tar
