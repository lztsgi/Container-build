name: Build-Phantun-test

on:
  workflow_dispatch:

env:
  APP_NAME: "phantun"
  APP_VERSION: "0.8.1"
  FILE_PREFIX: "phantun-linux"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64

    steps:
      - name: Checkout official source
        uses: actions/checkout@v4
        with:
          repository: dndx/phantun
          ref: v${{ env.APP_VERSION }}
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Dockerfile
        run: |
          cat > Dockerfile.alpine <<'EOF'
          FROM rust:1.88-alpine AS builder

          WORKDIR /src

          ENV CARGO_PROFILE_RELEASE_LTO=fat \
              CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 \
              CARGO_NET_GIT_FETCH_WITH_CLI=true

          RUN apk add --no-cache musl-dev binutils

          COPY . .

          RUN cargo build -p phantun --release --locked --bins
          RUN strip /src/target/release/client /src/target/release/server || true

          FROM alpine:3.20

          COPY --from=builder /src/target/release/client /usr/local/bin/phantun-client
          COPY --from=builder /src/target/release/server /usr/local/bin/phantun-server

          RUN cat > /usr/local/bin/docker-entrypoint.sh <<'SH' && chmod +x /usr/local/bin/docker-entrypoint.sh
          #!/bin/sh
          set -eu

          MODE="${RUN_MODE:-client}"
          LOCAL="${LOCAL_ADDR:-}"
          REMOTE="${REMOTE_ADDR:-}"

          [ -n "$LOCAL" ] || { echo "Error: LOCAL_ADDR missing"; exit 1; }
          [ -n "$REMOTE" ] || { echo "Error: REMOTE_ADDR missing"; exit 1; }

          EXEC_BIN="/usr/local/bin/phantun-client"
          if [ "$MODE" = "server" ]; then
            EXEC_BIN="/usr/local/bin/phantun-server"
          fi

          EXTRA_ARGS=""

          if [ -n "${TUN_NAME:-}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --tun ${TUN_NAME}"
          fi
          if [ -n "${TUN_LOCAL:-}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --tun-local ${TUN_LOCAL}"
          fi
          if [ -n "${TUN_PEER:-}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --tun-peer ${TUN_PEER}"
          fi

          # shellcheck disable=SC2086
          exec "$EXEC_BIN" --local "$LOCAL" --remote "$REMOTE" $EXTRA_ARGS "$@"
          SH

          ENV RUN_MODE="client" \
              LOCAL_ADDR="" \
              REMOTE_ADDR="" \
              TUN_NAME="" \
              TUN_LOCAL="" \
              TUN_PEER=""

          ENTRYPOINT ["/usr/local/bin/docker-entrypoint.sh"]
          EOF

      - name: Show Dockerfile for verification
        run: |
          echo "===== Dockerfile.alpine ====="
          cat Dockerfile.alpine

      - name: Build docker archive tar
        run: |
          FILENAME="${{ env.FILE_PREFIX }}-${{ env.APP_VERSION }}-${{ matrix.arch }}.tar"

          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --provenance=false \
            --sbom=false \
            --output "type=docker,dest=${FILENAME}" \
            -f Dockerfile.alpine \
            .

          ls -lh "${FILENAME}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILE_PREFIX }}-${{ env.APP_VERSION }}-${{ matrix.arch }}
          path: ${{ env.FILE_PREFIX }}-${{ env.APP_VERSION }}-${{ matrix.arch }}.tar
          if-no-files-found: error
